name: Secret Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  schedule:
    # Run weekly on Mondays at 9:00 AM UTC (aligned with other security scans)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect Secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for accurate secret scanning across all commits
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for PR comments on private repos.
          # Leave unset for public repos or to skip PR comments.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
