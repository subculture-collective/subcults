# Default values for subcults
# Override per environment: helm install -f values-prod.yaml subcults ./deploy/helm/subcults

global:
  environment: production
  imageRegistry: ghcr.io/subculture-collective
  imagePullPolicy: Always

api:
  enabled: true
  replicaCount: 3
  image:
    repository: subcults-api
    tag: latest
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  probes:
    liveness:
      path: /health/live
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /health/ready
      initialDelaySeconds: 5
      periodSeconds: 5
    startup:
      path: /health/live
      periodSeconds: 5
      failureThreshold: 24

indexer:
  enabled: true
  replicaCount: 1
  image:
    repository: subcults-indexer
    tag: latest
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: subcults-frontend
    tag: latest
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  service:
    type: ClusterIP
    port: 80
    targetPort: 80

config:
  port: "8080"
  metricsPort: "9090"
  corsAllowedOrigins: "https://subcults.subcult.tv"
  rankTrustEnabled: "false"
  tracingEnabled: "true"
  tracingExporterType: "otlp-http"
  tracingSampleRate: "0.1"
  canaryEnabled: "false"
  jetstreamUrl: "wss://jetstream1.us-east.bsky.network/subscribe"

# Secrets are referenced from an existing secret — do not store values here
secrets:
  existingSecret: subcults-secrets

networkPolicies:
  enabled: true

podDisruptionBudget:
  enabled: true
  api:
    minAvailable: 1
  frontend:
    minAvailable: 1

migration:
  enabled: false
  image: migrate/migrate:latest
