{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "subcults.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "subcults.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade,pre-install
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "subcults.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ .Values.migration.image }}
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "subcults.fullname" . }}-migrations
{{- end }}
