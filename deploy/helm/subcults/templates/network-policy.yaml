{{- if .Values.networkPolicies.enabled }}
# API: accepts traffic from frontend and ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "subcults.fullname" . }}-api
  labels:
    {{- include "subcults.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "subcults.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ingress
      ports:
        - port: {{ .Values.api.service.targetPort }}
          protocol: TCP
    # Allow Prometheus scraping on metrics port
    - ports:
        - port: 9090
          protocol: TCP
---
# Indexer: accepts only Prometheus scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "subcults.fullname" . }}-indexer
  labels:
    {{- include "subcults.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "subcults.selectorLabels" (dict "root" . "component" "indexer") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.indexer.service.targetPort }}
          protocol: TCP
---
# Frontend: restricted egress to API + DNS only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "subcults.fullname" . }}-frontend
  labels:
    {{- include "subcults.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "subcults.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - port: {{ .Values.api.service.targetPort }}
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
