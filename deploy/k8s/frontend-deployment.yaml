apiVersion: apps/v1
kind: Deployment
metadata:
  name: subcults-frontend
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: subcults
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: subcults-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subcults-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: subcults
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: frontend
        image: ghcr.io/subculture-collective/subcults-frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: subcults-frontend
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-frontend
    app.kubernetes.io/part-of: subcults
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: subcults-frontend
