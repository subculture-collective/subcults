# Restrict traffic between services:
# - Frontend: only receives ingress, no egress to internal services
# - API: receives from frontend/ingress, egresses to database/external
# - Indexer: no ingress (except metrics scraping), egresses to database/jetstream
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-network-policy
  namespace: subcults
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: subcults-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: subcults-frontend
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ingress
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: indexer-network-policy
  namespace: subcults
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: subcults-indexer
  policyTypes:
    - Ingress
  ingress:
    # Only allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: subcults
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: subcults-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ingress
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Frontend only needs to reach the API (for SSR or proxy scenarios)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: subcults-api
      ports:
        - protocol: TCP
          port: 8080
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
