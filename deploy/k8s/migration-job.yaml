# Pre-deployment database migration job
# Run before deploying new versions: kubectl apply -f migration-job.yaml
# Uses golang-migrate with the migrations baked into the API image
apiVersion: batch/v1
kind: Job
metadata:
  name: subcults-migrate
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: subcults
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subcults-migrate
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: migrate/migrate:latest
        command:
        - migrate
        - -path
        - /migrations
        - -database
        - $(DATABASE_URL)
        - up
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: subcults-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: migrations
          mountPath: /migrations
          readOnly: true
      volumes:
      - name: migrations
        configMap:
          name: subcults-migrations
