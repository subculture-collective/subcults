apiVersion: apps/v1
kind: Deployment
metadata:
  name: subcults-api
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: subcults
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: subcults-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subcults-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: subcults
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: api
        image: ghcr.io/subculture-collective/subcults-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: subcults-config
        - secretRef:
            name: subcults-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
        startupProbe:
          httpGet:
            path: /health/live
            port: http
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 24
---
apiVersion: v1
kind: Service
metadata:
  name: subcults-api
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-api
    app.kubernetes.io/part-of: subcults
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: subcults-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: subcults-api
  namespace: subcults
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: subcults-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
