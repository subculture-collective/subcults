apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: subcults-indexer
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-indexer
    app.kubernetes.io/component: indexer
    app.kubernetes.io/part-of: subcults
spec:
  replicas: 1
  serviceName: subcults-indexer
  selector:
    matchLabels:
      app.kubernetes.io/name: subcults-indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: subcults-indexer
        app.kubernetes.io/component: indexer
        app.kubernetes.io/part-of: subcults
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: indexer
          image: ghcr.io/subculture-collective/subcults-indexer:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: subcults-config
            - secretRef:
                name: subcults-secrets
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            httpGet:
              path: /internal/indexer/metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /internal/indexer/metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: subcults-indexer
  namespace: subcults
  labels:
    app.kubernetes.io/name: subcults-indexer
    app.kubernetes.io/part-of: subcults
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: subcults-indexer
